<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vocab Trainer — Cambridge Words</title>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap");
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --bg: #0a0a0f;
                --bg2: #111118;
                --bg3: #1a1a24;
                --bg4: #22222e;
                --border: rgba(255, 255, 255, 0.06);
                --border2: rgba(255, 255, 255, 0.1);
                --text: #e2e8f0;
                --text2: #94a3b8;
                --text3: #64748b;
                --primary: #0d9488;
                --primary-light: #2dd4bf;
                --accent: #8b5cf6;
                --success: #10b981;
                --warning: #f59e0b;
                --danger: #ef4444;
                --radius: 12px;
                --radius-sm: 8px;
            }
            body {
                font-family:
                    "Inter",
                    -apple-system,
                    sans-serif;
                background: var(--bg);
                color: var(--text);
                min-height: 100vh;
                overflow-x: hidden;
            }
            .app {
                max-width: 800px;
                margin: 0 auto;
                padding: 20px;
            }
            .header {
                text-align: center;
                padding: 40px 20px 30px;
            }
            .header h1 {
                font-size: 28px;
                font-weight: 800;
                background: linear-gradient(
                    135deg,
                    var(--primary-light),
                    var(--accent)
                );
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                margin-bottom: 8px;
            }
            .header p {
                color: var(--text3);
                font-size: 14px;
            }
            .stats {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
                margin-bottom: 24px;
            }
            .stat {
                background: var(--bg2);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 16px;
                text-align: center;
            }
            .stat-num {
                font-size: 24px;
                font-weight: 800;
                color: var(--primary-light);
            }
            .stat-label {
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.8px;
                color: var(--text3);
                margin-top: 4px;
            }
            .tabs {
                display: flex;
                gap: 4px;
                background: var(--bg2);
                border-radius: var(--radius);
                padding: 4px;
                margin-bottom: 24px;
                border: 1px solid var(--border);
            }
            .tab {
                flex: 1;
                padding: 10px;
                border: none;
                background: none;
                color: var(--text3);
                font-size: 13px;
                font-weight: 600;
                cursor: pointer;
                border-radius: var(--radius-sm);
                transition: all 0.2s;
                font-family: inherit;
            }
            .tab:hover {
                color: var(--text2);
            }
            .tab-active {
                background: var(--primary);
                color: #fff;
            }
            .panel {
                display: none;
            }
            .panel-active {
                display: block;
            }
            .btn {
                padding: 10px 20px;
                border-radius: var(--radius-sm);
                border: 1px solid var(--border2);
                background: var(--bg3);
                color: var(--text);
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.15s;
                font-family: inherit;
            }
            .btn:hover {
                background: var(--bg4);
                border-color: rgba(255, 255, 255, 0.15);
            }
            .btn-primary {
                background: var(--primary);
                border-color: var(--primary);
                color: #fff;
            }
            .btn-primary:hover {
                background: #0f766e;
            }
            .btn-success {
                background: var(--success);
                border-color: var(--success);
                color: #fff;
            }
            .btn-danger {
                background: var(--danger);
                border-color: var(--danger);
                color: #fff;
            }
            .btn:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            .btn-lg {
                padding: 14px 28px;
                font-size: 16px;
            }
            .import-area {
                border: 2px dashed var(--border2);
                border-radius: var(--radius);
                padding: 40px;
                text-align: center;
                cursor: pointer;
                transition: all 0.2s;
            }
            .import-area:hover {
                border-color: var(--primary);
                background: rgba(13, 148, 136, 0.05);
            }
            .import-area.dragover {
                border-color: var(--primary);
                background: rgba(13, 148, 136, 0.1);
            }
            .import-icon {
                font-size: 48px;
                margin-bottom: 12px;
            }
            .import-text {
                color: var(--text2);
                font-size: 14px;
            }
            .import-text strong {
                color: var(--primary-light);
            }
            .word-grid {
                display: grid;
                gap: 8px;
            }
            .word-row {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 16px;
                background: var(--bg2);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                transition: all 0.15s;
            }
            .word-row:hover {
                border-color: var(--border2);
            }
            .word-main {
                flex: 1;
            }
            .word-text {
                font-size: 16px;
                font-weight: 600;
            }
            .word-pos {
                font-size: 12px;
                color: var(--primary-light);
                margin-left: 8px;
            }
            .word-def {
                font-size: 13px;
                color: var(--text3);
                margin-top: 2px;
                line-height: 1.4;
            }
            .word-domain {
                font-size: 10px;
                padding: 2px 6px;
                border-radius: 4px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-left: 6px;
            }
            .domain-thinking {
                background: rgba(59, 130, 246, 0.15);
                color: #60a5fa;
            }
            .domain-psychology {
                background: rgba(236, 72, 153, 0.15);
                color: #f472b6;
            }
            .domain-ai {
                background: rgba(139, 92, 246, 0.15);
                color: #a78bfa;
            }
            .domain-economics {
                background: rgba(245, 158, 11, 0.15);
                color: #fbbf24;
            }
            .domain-writing {
                background: rgba(16, 185, 129, 0.15);
                color: #34d399;
            }
            .domain-philosophy {
                background: rgba(239, 68, 68, 0.15);
                color: #f87171;
            }
            .domain-everyday {
                background: rgba(100, 116, 139, 0.15);
                color: #94a3b8;
            }
            .word-actions {
                display: flex;
                gap: 6px;
            }
            .word-btn {
                width: 32px;
                height: 32px;
                border-radius: 6px;
                border: 1px solid var(--border);
                background: var(--bg3);
                color: var(--text3);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                transition: all 0.15s;
            }
            .word-btn:hover {
                color: var(--text);
                border-color: var(--border2);
            }
            .word-btn.known {
                color: var(--success);
                border-color: var(--success);
            }
            .word-btn.learning {
                color: var(--warning);
                border-color: var(--warning);
            }
            .flashcard-container {
                perspective: 1200px;
                margin: 20px 0;
            }
            .flashcard {
                width: 100%;
                min-height: 300px;
                position: relative;
                transition: transform 0.6s;
                transform-style: preserve-3d;
                cursor: pointer;
            }
            .flashcard.flipped {
                transform: rotateY(180deg);
            }
            .flashcard-face {
                position: absolute;
                inset: 0;
                backface-visibility: hidden;
                border-radius: var(--radius);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 40px;
                text-align: center;
            }
            .flashcard-front {
                background: linear-gradient(135deg, var(--bg2), var(--bg3));
                border: 1px solid var(--border2);
            }
            .flashcard-back {
                background: linear-gradient(135deg, #0f172a, #1e1b4b);
                border: 1px solid rgba(139, 92, 246, 0.3);
                transform: rotateY(180deg);
            }
            .flashcard-word {
                font-size: 36px;
                font-weight: 800;
                margin-bottom: 8px;
            }
            .flashcard-pos {
                font-size: 16px;
                color: var(--primary-light);
                margin-bottom: 16px;
            }
            .flashcard-hint {
                font-size: 13px;
                color: var(--text3);
            }
            .flashcard-def {
                font-size: 18px;
                line-height: 1.5;
                color: var(--text);
            }
            .flashcard-counter {
                text-align: center;
                color: var(--text3);
                font-size: 13px;
                margin-top: 12px;
            }
            .quiz-card {
                background: var(--bg2);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 32px;
                margin-bottom: 16px;
            }
            .quiz-progress {
                height: 4px;
                background: var(--bg4);
                border-radius: 2px;
                margin-bottom: 24px;
                overflow: hidden;
            }
            .quiz-progress-fill {
                height: 100%;
                background: linear-gradient(
                    90deg,
                    var(--primary),
                    var(--accent)
                );
                border-radius: 2px;
                transition: width 0.3s;
            }
            .quiz-question {
                font-size: 14px;
                color: var(--text3);
                margin-bottom: 8px;
            }
            .quiz-word {
                font-size: 32px;
                font-weight: 800;
                margin-bottom: 24px;
            }
            .quiz-options {
                display: grid;
                gap: 10px;
            }
            .quiz-option {
                padding: 14px 20px;
                background: var(--bg3);
                border: 1px solid var(--border);
                border-radius: var(--radius-sm);
                cursor: pointer;
                font-size: 14px;
                color: var(--text);
                text-align: left;
                transition: all 0.15s;
                font-family: inherit;
            }
            .quiz-option:hover {
                border-color: var(--primary);
                background: rgba(13, 148, 136, 0.05);
            }
            .quiz-option.correct {
                border-color: var(--success);
                background: rgba(16, 185, 129, 0.1);
                color: var(--success);
            }
            .quiz-option.wrong {
                border-color: var(--danger);
                background: rgba(239, 68, 68, 0.1);
                color: var(--danger);
            }
            .quiz-option:disabled {
                cursor: default;
            }
            .quiz-input {
                width: 100%;
                padding: 14px 20px;
                background: var(--bg3);
                border: 2px solid var(--border2);
                border-radius: var(--radius-sm);
                color: var(--text);
                font-size: 18px;
                font-family: inherit;
                outline: none;
                transition: border-color 0.2s;
            }
            .quiz-input:focus {
                border-color: var(--primary);
            }
            .quiz-result {
                text-align: center;
                padding: 40px;
                background: var(--bg2);
                border-radius: var(--radius);
                border: 1px solid var(--border);
            }
            .quiz-result h2 {
                font-size: 32px;
                margin-bottom: 12px;
            }
            .section-title {
                font-size: 18px;
                font-weight: 700;
                margin-bottom: 16px;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .audio-btn {
                background: none;
                border: none;
                cursor: pointer;
                font-size: 18px;
                padding: 4px;
                transition: transform 0.15s;
            }
            .audio-btn:hover {
                transform: scale(1.2);
            }
            .flex {
                display: flex;
            }
            .gap-8 {
                gap: 8px;
            }
            .gap-12 {
                gap: 12px;
            }
            .mb-16 {
                margin-bottom: 16px;
            }
            .mb-24 {
                margin-bottom: 24px;
            }
            .text-center {
                text-align: center;
            }
            .text-muted {
                color: var(--text3);
            }
            .hidden {
                display: none !important;
            }
            @media (max-width: 600px) {
                .stats {
                    grid-template-columns: repeat(2, 1fr);
                }
                .flashcard-word {
                    font-size: 28px;
                }
                .quiz-word {
                    font-size: 24px;
                }
            }
        </style>
    </head>
    <body>
        <div class="app">
            <div class="header">
                <h1>🧠 Vocab Trainer</h1>
                <p>Cambridge Dictionary — Learn your word lists</p>
            </div>
            <div class="stats" id="stats">
                <div class="stat">
                    <div class="stat-num" id="stat-total">0</div>
                    <div class="stat-label">Total Words</div>
                </div>
                <div class="stat">
                    <div
                        class="stat-num"
                        id="stat-known"
                        style="color: #10b981"
                    >
                        0
                    </div>
                    <div class="stat-label">Known</div>
                </div>
                <div class="stat">
                    <div
                        class="stat-num"
                        id="stat-learning"
                        style="color: #f59e0b"
                    >
                        0
                    </div>
                    <div class="stat-label">Learning</div>
                </div>
                <div class="stat">
                    <div class="stat-num" id="stat-new" style="color: #64748b">
                        0
                    </div>
                    <div class="stat-label">New</div>
                </div>
            </div>
            <div class="tabs">
                <button class="tab tab-active" data-tab="import">
                    📁 Import
                </button>
                <button class="tab" data-tab="words">📖 Words</button>
                <button class="tab" data-tab="flashcards">🃏 Flashcards</button>
                <button class="tab" data-tab="quiz">❓ Quiz</button>
            </div>
            <div class="panel panel-active" id="panel-import">
                <div class="import-area" id="import-area">
                    <div class="import-icon">📄</div>
                    <div class="import-text">
                        <strong>Click or drag</strong> a CSV file here<br /><span
                            style="font-size: 12px; color: var(--text3)"
                            >Cambridge export format or generic word,definition
                            CSV</span
                        >
                    </div>
                    <input
                        type="file"
                        id="file-input"
                        accept=".csv,.txt"
                        style="display: none"
                    />
                </div>
                <div id="import-status" class="hidden" style="margin-top: 16px">
                    <div
                        style="
                            background: var(--bg2);
                            border: 1px solid var(--border);
                            border-radius: var(--radius-sm);
                            padding: 16px;
                        "
                    >
                        <div style="font-weight: 600; margin-bottom: 8px">
                            ✅ Loaded: <span id="import-name"></span>
                        </div>
                        <div style="font-size: 13px; color: var(--text3)">
                            <span id="import-count"></span> words from
                            <span id="import-lists"></span> lists
                        </div>
                        <button
                            class="btn btn-primary"
                            style="margin-top: 12px"
                            onclick="switchTab('words')"
                        >
                            Start Learning →
                        </button>
                    </div>
                </div>
            </div>
            <div class="panel" id="panel-words">
                <div class="flex gap-12 mb-16" style="flex-wrap: wrap">
                    <select id="list-filter" class="btn" style="flex: 1">
                        <option value="all">All Lists</option>
                    </select>
                    <select id="domain-filter" class="btn" style="flex: 1">
                        <option value="all">All Domains</option>
                        <option value="thinking">🧠 Thinking</option>
                        <option value="psychology">💜 Psychology</option>
                        <option value="ai">🤖 AI & Tech</option>
                        <option value="economics">💰 Economics</option>
                        <option value="writing">✍️ Writing</option>
                        <option value="philosophy">📜 Philosophy</option>
                        <option value="everyday">📖 Everyday</option>
                    </select>
                    <input
                        type="text"
                        id="word-search"
                        placeholder="Search words..."
                        class="btn"
                        style="flex: 2"
                    />
                </div>
                <div class="word-grid" id="word-grid"></div>
            </div>
            <div class="panel" id="panel-flashcards">
                <div class="text-center mb-24">
                    <select
                        id="fc-list-select"
                        class="btn mb-16"
                        style="min-width: 200px"
                    >
                        <option value="all">All Words</option>
                        <option value="new">New Words Only</option>
                        <option value="learning">Learning</option>
                        <option value="known">Known</option>
                    </select>
                </div>
                <div class="flashcard-container">
                    <div class="flashcard" id="flashcard" onclick="flipCard()">
                        <div class="flashcard-face flashcard-front">
                            <div class="flashcard-word" id="fc-word">—</div>
                            <div class="flashcard-pos" id="fc-pos"></div>
                            <button
                                class="audio-btn"
                                id="fc-audio-btn"
                                onclick="
                                    event.stopPropagation();
                                    playAudio();
                                "
                            >
                                🔊
                            </button>
                            <div class="flashcard-hint">tap to reveal</div>
                        </div>
                        <div class="flashcard-face flashcard-back">
                            <div class="flashcard-def" id="fc-def">—</div>
                        </div>
                    </div>
                </div>
                <div class="flashcard-counter" id="fc-counter">0 / 0</div>
                <div
                    class="flex gap-12 mb-16"
                    style="justify-content: center; margin-top: 16px"
                >
                    <button
                        class="btn btn-danger"
                        onclick="markCard('learning')"
                    >
                        🔄 Still Learning
                    </button>
                    <button class="btn btn-success" onclick="markCard('known')">
                        ✅ Got It
                    </button>
                    <button class="btn" onclick="nextCard()">⏭ Skip</button>
                </div>
            </div>
            <div class="panel" id="panel-quiz">
                <div id="quiz-setup" class="text-center" style="padding: 40px">
                    <div
                        class="section-title"
                        style="justify-content: center; margin-bottom: 24px"
                    >
                        Choose Quiz Type
                    </div>
                    <div
                        class="flex gap-12"
                        style="justify-content: center; flex-wrap: wrap"
                    >
                        <button
                            class="btn btn-primary btn-lg"
                            onclick="startQuiz('mc')"
                        >
                            🎯 Multiple Choice
                        </button>
                        <button class="btn btn-lg" onclick="startQuiz('type')">
                            ⌨️ Type Answer
                        </button>
                    </div>
                    <div style="margin-top: 16px">
                        <select id="quiz-count" class="btn">
                            <option value="10">10 questions</option>
                            <option value="20">20 questions</option>
                            <option value="50">50 questions</option>
                            <option value="0">All words</option>
                        </select>
                    </div>
                </div>
                <div id="quiz-active" class="hidden"></div>
                <div id="quiz-result" class="hidden"></div>
            </div>
        </div>
        <script>
            let allWords = [],
                wordStatus = {},
                fcDeck = [],
                fcIndex = 0,
                quizState = null;
            try {
                const s = localStorage.getItem("vt_words");
                if (s) allWords = JSON.parse(s);
                const ss = localStorage.getItem("vt_status");
                if (ss) wordStatus = JSON.parse(ss);
            } catch (e) {}
            function save() {
                localStorage.setItem("vt_words", JSON.stringify(allWords));
                localStorage.setItem("vt_status", JSON.stringify(wordStatus));
            }
            function playAudio(word) {
                if (!word) word = fcDeck[fcIndex]?.word;
                if (!word) return;
                const slug = word
                    .toLowerCase()
                    .replace(/[^a-z0-9]/g, "_")
                    .replace(/_+/g, "_");
                const a = new Audio(
                    `https://dictionary.cambridge.org/media/english/us_pron/${slug[0]}/${slug.substring(0, 3)}/${slug}/${slug}.mp3`,
                );
                a.onerror = () => {
                    const a2 = new Audio(
                        `https://dictionary.cambridge.org/media/english/us_pron/${word.toLowerCase()}.mp3`,
                    );
                    a2.onerror = () => {};
                    a2.play().catch(() => {});
                };
                a.play().catch(() => {});
            }
            document
                .querySelectorAll(".tab")
                .forEach((t) =>
                    t.addEventListener("click", () => switchTab(t.dataset.tab)),
                );
            function switchTab(n) {
                document
                    .querySelectorAll(".tab")
                    .forEach((t) =>
                        t.classList.toggle("tab-active", t.dataset.tab === n),
                    );
                document
                    .querySelectorAll(".panel")
                    .forEach((p) =>
                        p.classList.toggle(
                            "panel-active",
                            p.id === "panel-" + n,
                        ),
                    );
                if (n === "words") renderWords();
                if (n === "flashcards") initFlashcards();
            }
            function updateStats() {
                const t = allWords.length,
                    k = allWords.filter(
                        (w) => wordStatus[w.word] === "known",
                    ).length,
                    l = allWords.filter(
                        (w) => wordStatus[w.word] === "learning",
                    ).length;
                document.getElementById("stat-total").textContent = t;
                document.getElementById("stat-known").textContent = k;
                document.getElementById("stat-learning").textContent = l;
                document.getElementById("stat-new").textContent = t - k - l;
            }
            const importArea = document.getElementById("import-area"),
                fileInput = document.getElementById("file-input");
            importArea.addEventListener("click", () => fileInput.click());
            importArea.addEventListener("dragover", (e) => {
                e.preventDefault();
                importArea.classList.add("dragover");
            });
            importArea.addEventListener("dragleave", () =>
                importArea.classList.remove("dragover"),
            );
            importArea.addEventListener("drop", (e) => {
                e.preventDefault();
                importArea.classList.remove("dragover");
                if (e.dataTransfer.files[0]) parseFile(e.dataTransfer.files[0]);
            });
            fileInput.addEventListener("change", () => {
                if (fileInput.files[0]) parseFile(fileInput.files[0]);
            });
            function parseFile(file) {
                const r = new FileReader();
                r.onload = () => {
                    const words = parseCSV(r.result);
                    if (!words.length) {
                        alert("No words found.");
                        return;
                    }
                    const ex = new Set(allWords.map((w) => w.word));
                    let added = 0;
                    words.forEach((w) => {
                        if (!ex.has(w.word)) {
                            allWords.push(w);
                            ex.add(w.word);
                            if (!wordStatus[w.word]) wordStatus[w.word] = "new";
                            added++;
                        }
                    });
                    save();
                    updateStats();
                    document
                        .getElementById("import-status")
                        .classList.remove("hidden");
                    document.getElementById("import-name").textContent =
                        file.name;
                    document.getElementById("import-count").textContent =
                        `${added} new (${allWords.length} total)`;
                    const lists = [...new Set(allWords.map((w) => w.listName))];
                    document.getElementById("import-lists").textContent =
                        lists.length;
                    const f = document.getElementById("list-filter");
                    f.innerHTML = '<option value="all">All Lists</option>';
                    lists.forEach((l) => {
                        f.innerHTML += `<option value="${l}">${l}</option>`;
                    });
                };
                r.readAsText(file);
            }
            function parseCSV(text) {
                const words = [];
                let cur = "Unknown";
                for (const line of text.split("\n")) {
                    const t = line.trim();
                    if (!t) continue;
                    if (t.startsWith("Word list:")) {
                        cur =
                            t
                                .replace("Word list:", "")
                                .replace(/,+/g, "")
                                .trim() || "Unknown";
                        continue;
                    }
                    const p = parseCSVLine(t);
                    if (p.length < 2) continue;
                    const word = (p[0] || "").trim(),
                        pos = (p[1] || "").trim(),
                        def = (p[2] || "").trim();
                    if (
                        !word ||
                        word.length > 80 ||
                        /^(Word list|word,pos)/i.test(word)
                    )
                        continue;
                    words.push({
                        word,
                        pos,
                        definition: def,
                        listName: cur,
                        domain: detectDomain(cur),
                    });
                }
                return words;
            }
            function detectDomain(n) {
                const l = n.toLowerCase();
                if (/think|epistem|reason|logic|deduc|induc|infer/.test(l))
                    return "thinking";
                if (/psycho|cogni|emot|behav|mind/.test(l)) return "psychology";
                if (/ai|tech|machine|comput|neural|model/.test(l)) return "ai";
                if (/econ|financ|market|business|invest/.test(l))
                    return "economics";
                if (/writ|rhetor|essay|prose|style|languag/.test(l))
                    return "writing";
                if (/philo|moral|ethic|exist|logic/.test(l))
                    return "philosophy";
                return "everyday";
            }
            function parseCSVLine(line) {
                const r = [];
                let c = "",
                    q = false;
                for (let i = 0; i < line.length; i++) {
                    const ch = line[i];
                    if (q) {
                        if (ch === '"' && line[i + 1] === '"') {
                            c += '"';
                            i++;
                        } else if (ch === '"') q = false;
                        else c += ch;
                    } else {
                        if (ch === '"') q = true;
                        else if (ch === ",") {
                            r.push(c);
                            c = "";
                        } else c += ch;
                    }
                }
                r.push(c);
                return r;
            }
            function renderWords() {
                const grid = document.getElementById("word-grid"),
                    filter = document.getElementById("list-filter").value,
                    domain = document.getElementById("domain-filter").value,
                    search = document
                        .getElementById("word-search")
                        .value.toLowerCase();
                let f = allWords;
                if (filter !== "all")
                    f = f.filter((w) => w.listName === filter);
                if (domain !== "all")
                    f = f.filter((w) => (w.domain || "everyday") === domain);
                if (search)
                    f = f.filter(
                        (w) =>
                            w.word.toLowerCase().includes(search) ||
                            w.definition.toLowerCase().includes(search),
                    );
                grid.innerHTML =
                    f
                        .map((w) => {
                            const s = wordStatus[w.word] || "new",
                                d = w.domain || "everyday";
                            return `<div class="word-row"><div class="word-main"><div><span class="word-text">${w.word}</span><span class="word-pos">${w.pos}</span><span class="word-domain domain-${d}">${d}</span></div><div class="word-def">${w.definition}</div></div><div class="word-actions"><button class="audio-btn" onclick="playAudio('${w.word.replace(/'/g, "\\'")}')">🔊</button><button class="word-btn ${s === "known" ? "known" : ""}" onclick="toggleStatus('${w.word.replace(/'/g, "\\'")}','known')" title="Mark known">✅</button><button class="word-btn ${s === "learning" ? "learning" : ""}" onclick="toggleStatus('${w.word.replace(/'/g, "\\'")}','learning')" title="Mark learning">🔄</button></div></div>`;
                        })
                        .join("") ||
                    '<div class="text-center text-muted" style="padding:40px">No words found. Import a CSV first!</div>';
            }
            document
                .getElementById("list-filter")
                .addEventListener("change", renderWords);
            document
                .getElementById("domain-filter")
                .addEventListener("change", renderWords);
            document
                .getElementById("word-search")
                .addEventListener("input", renderWords);
            function toggleStatus(w, s) {
                wordStatus[w] = wordStatus[w] === s ? "new" : s;
                save();
                updateStats();
                renderWords();
            }
            function initFlashcards() {
                const f = document.getElementById("fc-list-select").value;
                let p = [...allWords];
                if (f === "new")
                    p = p.filter(
                        (w) =>
                            !wordStatus[w.word] || wordStatus[w.word] === "new",
                    );
                else if (f === "learning")
                    p = p.filter((w) => wordStatus[w.word] === "learning");
                else if (f === "known")
                    p = p.filter((w) => wordStatus[w.word] === "known");
                for (let i = p.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [p[i], p[j]] = [p[j], p[i]];
                }
                fcDeck = p;
                fcIndex = 0;
                showCard();
            }
            document
                .getElementById("fc-list-select")
                .addEventListener("change", initFlashcards);
            function showCard() {
                if (!fcDeck.length) {
                    document.getElementById("fc-word").textContent = "No words";
                    document.getElementById("fc-pos").textContent =
                        "Import a CSV first";
                    document.getElementById("fc-counter").textContent = "0 / 0";
                    return;
                }
                const c = fcDeck[fcIndex];
                document.getElementById("fc-word").textContent = c.word;
                document.getElementById("fc-pos").textContent = c.pos;
                document.getElementById("fc-def").textContent = c.definition;
                document.getElementById("fc-counter").textContent =
                    `${fcIndex + 1} / ${fcDeck.length}`;
                document
                    .getElementById("flashcard")
                    .classList.remove("flipped");
            }
            function flipCard() {
                document
                    .getElementById("flashcard")
                    .classList.toggle("flipped");
            }
            function nextCard() {
                fcIndex = (fcIndex + 1) % fcDeck.length;
                showCard();
            }
            function markCard(s) {
                if (fcDeck[fcIndex]) {
                    wordStatus[fcDeck[fcIndex].word] = s;
                    save();
                    updateStats();
                }
                nextCard();
            }
            document.addEventListener("keydown", (e) => {
                if (
                    document
                        .getElementById("panel-flashcards")
                        .classList.contains("panel-active")
                ) {
                    if (e.code === "Space") {
                        e.preventDefault();
                        flipCard();
                    }
                    if (e.code === "ArrowRight") nextCard();
                    if (e.code === "Digit1") markCard("learning");
                    if (e.code === "Digit2") markCard("known");
                }
            });
            function startQuiz(type) {
                if (allWords.length < 4) {
                    alert("Need at least 4 words.");
                    return;
                }
                const count =
                    +document.getElementById("quiz-count").value || 10;
                let p = [...allWords];
                for (let i = p.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [p[i], p[j]] = [p[j], p[i]];
                }
                quizState = {
                    type,
                    questions: p.slice(0, count || p.length),
                    current: 0,
                    correct: 0,
                    answers: [],
                };
                document.getElementById("quiz-setup").classList.add("hidden");
                document.getElementById("quiz-result").classList.add("hidden");
                document
                    .getElementById("quiz-active")
                    .classList.remove("hidden");
                showQuizQ();
            }
            function showQuizQ() {
                const q = quizState.questions[quizState.current],
                    t = quizState.questions.length,
                    i = quizState.current,
                    c = document.getElementById("quiz-active");
                if (quizState.type === "mc") {
                    const correct = q.definition,
                        others = allWords
                            .filter((w) => w.word !== q.word)
                            .sort(() => Math.random() - 0.5)
                            .slice(0, 3)
                            .map((w) => w.definition);
                    const opts = [correct, ...others].sort(
                        () => Math.random() - 0.5,
                    );
                    c.innerHTML = `<div class="quiz-card"><div class="quiz-progress"><div class="quiz-progress-fill" style="width:${(i / t) * 100}%"></div></div><div class="quiz-question">What does this word mean? (${i + 1}/${t})</div><div class="quiz-word">${q.word} <span style="font-size:16px;color:var(--primary-light)">${q.pos}</span> <button class="audio-btn" onclick="playAudio('${q.word.replace(/'/g, "\\'")}')">🔊</button></div><div class="quiz-options">${opts.map((o) => `<button class="quiz-option" onclick="answerMC(this,${o === correct})">${o}</button>`).join("")}</div></div>`;
                } else {
                    c.innerHTML = `<div class="quiz-card"><div class="quiz-progress"><div class="quiz-progress-fill" style="width:${(i / t) * 100}%"></div></div><div class="quiz-question">Type the definition for: (${i + 1}/${t})</div><div class="quiz-word">${q.word} <span style="font-size:16px;color:var(--primary-light)">${q.pos}</span> <button class="audio-btn" onclick="playAudio('${q.word.replace(/'/g, "\\'")}')">🔊</button></div><input class="quiz-input" id="quiz-type-input" placeholder="Start typing the definition..." autofocus><div style="margin-top:12px;text-align:right"><button class="btn btn-primary" onclick="answerType()">Submit</button> <button class="btn" onclick="answerType(true)">Skip</button></div><div id="quiz-type-answer" class="hidden" style="margin-top:12px;padding:12px;background:var(--bg3);border-radius:var(--radius-sm);font-size:14px;color:var(--text2)"></div></div>`;
                    const inp = document.getElementById("quiz-type-input");
                    inp.focus();
                    inp.addEventListener("keydown", (e) => {
                        if (e.key === "Enter") answerType();
                    });
                }
            }
            function answerMC(btn, correct) {
                document.querySelectorAll(".quiz-option").forEach((b) => {
                    b.disabled = true;
                    if (
                        b.textContent ===
                        quizState.questions[quizState.current].definition
                    )
                        b.classList.add("correct");
                });
                if (!correct) btn.classList.add("wrong");
                if (correct) quizState.correct++;
                quizState.answers.push(correct);
                setTimeout(() => {
                    quizState.current++;
                    quizState.current >= quizState.questions.length
                        ? showQuizResult()
                        : showQuizQ();
                }, 1000);
            }
            function answerType(skip) {
                const inp = document.getElementById("quiz-type-input"),
                    ans = document.getElementById("quiz-type-answer"),
                    q = quizState.questions[quizState.current];
                ans.classList.remove("hidden");
                if (skip) {
                    ans.innerHTML = `<strong style="color:var(--danger)">Skipped</strong> — ${q.definition}`;
                    quizState.answers.push(false);
                } else {
                    const u = inp.value.toLowerCase().trim(),
                        c = q.definition.toLowerCase(),
                        ok =
                            u &&
                            (c.includes(u) || u.includes(c.substring(0, 20)));
                    if (ok) {
                        ans.innerHTML = `<strong style="color:var(--success)">✓ Correct!</strong>`;
                        quizState.correct++;
                        quizState.answers.push(true);
                    } else {
                        ans.innerHTML = `<strong style="color:var(--danger)">✗ Wrong</strong> — ${q.definition}`;
                        quizState.answers.push(false);
                    }
                }
                inp.disabled = true;
                setTimeout(() => {
                    quizState.current++;
                    quizState.current >= quizState.questions.length
                        ? showQuizResult()
                        : showQuizQ();
                }, 1500);
            }
            function showQuizResult() {
                document.getElementById("quiz-active").classList.add("hidden");
                const r = document.getElementById("quiz-result");
                r.classList.remove("hidden");
                const t = quizState.questions.length,
                    p = Math.round((quizState.correct / t) * 100);
                r.innerHTML = `<div class="quiz-result"><div style="font-size:48px;margin-bottom:16px">${p >= 80 ? "🎉" : p >= 50 ? "👍" : "💪"}</div><h2 style="color:${p >= 80 ? "var(--success)" : p >= 50 ? "var(--warning)" : "var(--danger)"}">${p}%</h2><p>${quizState.correct} / ${t} correct</p><div class="flex gap-12" style="justify-content:center"><button class="btn btn-primary" onclick="startQuiz('${quizState.type}')">Try Again</button><button class="btn" onclick="document.getElementById('quiz-setup').classList.remove('hidden');document.getElementById('quiz-active').classList.add('hidden');document.getElementById('quiz-result').classList.add('hidden')">Back</button></div></div>`;
            }
            updateStats();
            if (allWords.length > 0) {
                document
                    .getElementById("import-status")
                    .classList.remove("hidden");
                document.getElementById("import-name").textContent =
                    "Loaded from previous session";
                document.getElementById("import-count").textContent =
                    `${allWords.length} words`;
                const lists = [...new Set(allWords.map((w) => w.listName))];
                document.getElementById("import-lists").textContent =
                    lists.length;
                const f = document.getElementById("list-filter");
                f.innerHTML = '<option value="all">All Lists</option>';
                lists.forEach((l) => {
                    f.innerHTML += `<option value="${l}">${l}</option>`;
                });
            }
        </script>
    </body>
</html>
