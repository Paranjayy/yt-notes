<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Companion — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #8b5cf6;
      --primary-glow: rgba(139, 92, 246, 0.35);
      --secondary: #ec4899;
      --accent: #06b6d4;
      --bg: #0a0a0f;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.07);
      --bg-modal: rgba(15,15,25,0.97);
      --border: rgba(255,255,255,0.07);
      --border-accent: rgba(139,92,246,0.4);
      --text: #f1f5f9;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --success: #10b981;
      --danger: #f43f5e;
      --glass-blur: blur(20px);
      --radius: 16px;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(139,92,246,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(236,72,153,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 60% 30%, rgba(6,182,212,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 24px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px var(--primary-glow);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 30%, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
      font-weight: 400;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s ease;
      font-family: inherit;
      white-space: nowrap;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: 0 4px 14px var(--primary-glow);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--primary-glow); }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-dim);
      border-color: var(--border);
    }
    .btn-secondary:hover { background: var(--bg-card-hover); color: var(--text); border-color: var(--border-accent); }

    .btn-danger {
      background: rgba(244,63,94,0.15);
      color: var(--danger);
      border-color: rgba(244,63,94,0.3);
    }
    .btn-danger:hover { background: rgba(244,63,94,0.25); }

    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
    .btn-xs { padding: 4px 9px; font-size: 11px; border-radius: 6px; }

    /* ===== STATS BAR ===== */
    .stats-bar {
      display: flex;
      gap: 24px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    /* ===== SEARCH ===== */
    .search-bar-wrap {
      padding: 20px 0 0;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .search-input {
      flex: 1;
      padding: 11px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--border-accent); }
    .search-input::placeholder { color: var(--text-muted); }

    .filter-sort {
      display: flex;
      gap: 8px;
    }

    .filter-btn {
      padding: 9px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active { border-color: var(--border-accent); color: var(--primary); background: rgba(139,92,246,0.08); }

    /* ===== GRID ===== */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 20px 0 12px;
    }

    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* ===== VIDEO CARD ===== */
    .video-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all 0.25s ease;
      cursor: pointer;
      position: relative;
    }
    .video-card:hover {
      border-color: var(--border-accent);
      background: var(--bg-card-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .card-thumb-wrap {
      position: relative;
      aspect-ratio: 16/9;
      background: #111;
      overflow: hidden;
    }

    .card-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }
    .video-card:hover .card-thumb { transform: scale(1.04); }

    .card-thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(236,72,153,0.1));
      font-size: 32px;
    }

    .card-badges {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: flex-end;
    }

    .badge {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      backdrop-filter: blur(8px);
    }
    .badge-notes { background: rgba(139,92,246,0.85); color: white; }
    .badge-ss { background: rgba(6,182,212,0.85); color: white; }
    .badge-transcript { background: rgba(16,185,129,0.85); color: white; }

    .card-body {
      padding: 14px 16px 16px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .card-meta {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--bg-modal);
      border: 1px solid var(--border-accent);
      border-radius: 20px;
      max-width: 780px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7);
      transform: scale(0.95) translateY(10px);
      transition: transform 0.25s ease;
    }
    .modal-overlay.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 22px 24px 18px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg-modal);
      z-index: 10;
      border-radius: 20px 20px 0 0;
    }

    .modal-thumb {
      width: 120px;
      border-radius: 10px;
      flex-shrink: 0;
      aspect-ratio: 16/9;
      object-fit: cover;
    }

    .modal-header-info { flex: 1; }

    .modal-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.35;
    }

    .modal-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; flex-wrap: wrap; }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .modal-close:hover { color: var(--danger); }

    .modal-actions {
      display: flex;
      gap: 8px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .modal-body { padding: 20px 24px 24px; display: flex; flex-direction: column; gap: 24px; }

    .section-heading {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--primary);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Notes list inside modal */
    .note-row {
      display: flex;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      align-items: flex-start;
      transition: background 0.2s;
    }
    .note-row:hover { background: rgba(255,255,255,0.055); }

    .note-time {
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      background: rgba(139,92,246,0.15);
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
      flex-shrink: 0;
      cursor: pointer;
    }
    .note-time:hover { background: rgba(139,92,246,0.3); }

    .note-text { font-size: 13px; color: var(--text-dim); line-height: 1.5; }

    /* Screenshots grid in modal */
    .ss-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    .ss-item {
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
      background: #111;
    }
    .ss-item:hover { border-color: var(--border-accent); transform: translateY(-2px); box-shadow: var(--shadow); }

    .ss-item img { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; }

    .ss-meta {
      padding: 6px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }

    .ss-time { font-size: 10px; color: var(--text-muted); font-weight: 600; }

    .ss-url-btn {
      font-size: 10px;
      color: var(--accent);
      text-decoration: none;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(6,182,212,0.12);
      border: 1px solid rgba(6,182,212,0.2);
      white-space: nowrap;
      transition: background 0.2s;
    }
    .ss-url-btn:hover { background: rgba(6,182,212,0.25); }

    /* Transcript panel */
    .transcript-box {
      max-height: 300px;
      overflow-y: auto;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 12px;
      font-size: 12px;
      line-height: 1.8;
      color: var(--text-dim);
    }

    .transcript-line { margin-bottom: 4px; }
    .t-time { color: var(--primary); font-weight: 600; margin-right: 8px; font-size: 11px; }

    /* Markdown preview */
    .md-preview {
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      padding: 14px;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.7;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      text-align: center;
      gap: 16px;
      color: var(--text-muted);
    }

    .empty-icon { font-size: 56px; filter: grayscale(0.5); opacity: 0.6; }
    .empty-title { font-size: 20px; font-weight: 700; color: var(--text-dim); }
    .empty-desc { font-size: 14px; max-width: 420px; }

    /* ===== TOAST ===== */
    #sc-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30,30,45,0.95);
      border: 1px solid var(--border-accent);
      color: var(--text);
      padding: 12px 22px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      backdrop-filter: var(--glass-blur);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #sc-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(139,92,246,0.4); }

    /* Import file input hidden */
    #import-file { display: none; }

    /* Loading spinner */
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(139,92,246,0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Pill tag */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .pill-purple { background: rgba(139,92,246,0.15); color: var(--primary); border: 1px solid rgba(139,92,246,0.25); }
    .pill-teal { background: rgba(6,182,212,0.12); color: var(--accent); border: 1px solid rgba(6,182,212,0.2); }
    .pill-green { background: rgba(16,185,129,0.12); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }

    @media (max-width: 640px) {
      .videos-grid { grid-template-columns: 1fr; }
      .header { flex-direction: column; align-items: flex-start; }
      .modal { border-radius: 16px; }
      .modal-thumb { width: 80px; }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <div class="header-logo">🔮</div>
        <div>
          <div class="header-title">Social Companion</div>
          <div class="header-subtitle">Your YouTube notes, transcripts &amp; screenshots — all in one place</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-secondary" id="btn-import">⬆ Import JSON</button>
        <button class="btn btn-primary" id="btn-export-all">⬇ Export All</button>
        <input type="file" id="import-file" accept=".json" />
      </div>
    </header>

    <!-- Stats bar -->
    <div class="stats-bar" id="stats-bar">
      <div class="spinner"></div>
    </div>

    <!-- Search -->
    <div class="search-bar-wrap">
      <input type="text" class="search-input" id="search-input" placeholder="🔍  Search across all videos, notes, transcripts..." />
      <div class="filter-sort">
        <button class="filter-btn active" data-sort="recent">Recent</button>
        <button class="filter-btn" data-sort="notes">Most Notes</button>
        <button class="filter-btn" data-sort="alpha">A–Z</button>
      </div>
    </div>

    <!-- Grid label -->
    <div class="section-title" id="section-label">Videos with Content</div>

    <!-- Videos grid -->
    <div class="videos-grid" id="videos-grid">
      <div class="spinner" style="grid-column: 1/-1;"></div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <img class="modal-thumb" id="modal-thumb" src="" alt="" />
        <div class="modal-header-info">
          <div class="modal-title" id="modal-title">Video Title</div>
          <div class="modal-meta" id="modal-meta"></div>
        </div>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-actions" id="modal-actions"></div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="sc-toast"></div>

  <script src="dashboard.js"></script>
</body>
</html>
